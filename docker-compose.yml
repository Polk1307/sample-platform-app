services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sample-platform-api
    environment:
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    container_name: sample-platform-postgres
    environment:
      POSTGRES_DB: sample_platform
      POSTGRES_USER: sample
      POSTGRES_PASSWORD: sample
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sample-platform-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
